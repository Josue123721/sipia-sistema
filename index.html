<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SIPIA — Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0a0f16; --panel: #131c27; --panel-2: #0e1621; --border: #22303f;
    --text: #e6edf3; --muted: #7c8b99;
    --green: #2ecc71; --yellow: #f1c40f; --red: #e74c3c; --blue: #3ea6ff; --amber: #ffb547;
    --mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    --sans: "Segoe UI", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  ::selection { background: rgba(62,166,255,.3); }
  body {
    margin: 0; background:
      radial-gradient(1200px 400px at 50% -10%, rgba(62,166,255,.06), transparent),
      var(--bg);
    color: var(--text); font-family: var(--sans);
  }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--blue); outline-offset: 2px;
  }

  header {
    position: sticky; top: 0; z-index: 10;
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,15,22,.85); backdrop-filter: blur(8px);
  }
  header h1 {
    margin: 0; font-size: 18px; font-weight: 700; letter-spacing: .02em;
    display: flex; align-items: center; gap: 10px;
  }
  header h1 .tag { font-family: var(--mono); font-size: 11px; color: var(--muted); font-weight: 400; border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; }
  .estado-wrap { display: flex; align-items: center; gap: 16px; }
  .estado { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .estado .hora { font-family: var(--mono); font-size: 11px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.conectado { background: var(--green); box-shadow: 0 0 0 3px rgba(46,204,113,.15); }
  .dot.desconectado { background: var(--red); box-shadow: 0 0 0 3px rgba(231,76,60,.15); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  @media (prefers-reduced-motion: reduce) { .dot.desconectado { animation: none; } }

  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; padding: 20px 24px 0; }
  .kpi {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
    transition: border-color .2s;
  }
  .kpi .top { display: flex; justify-content: space-between; align-items: flex-start; }
  .kpi .valor { font-size: 26px; font-weight: 700; font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .kpi .icon { font-size: 15px; opacity: .5; }
  .kpi .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
  .kpi.alerta { border-color: rgba(231,76,60,.4); }

  .grid-sensores { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px,1fr)); gap: 16px; padding: 20px 24px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-header h3 { margin: 0; font-size: 13px; color: var(--text); font-weight: 600; letter-spacing: .04em; font-family: var(--mono); }
  .card-header .ultimo { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .badge { font-size: 10px; padding: 3px 8px; border-radius: 999px; font-weight: 700; letter-spacing: .03em; }
  .badge.verde { background: rgba(46,204,113,.15); color: var(--green); }
  .badge.amarillo { background: rgba(241,196,15,.15); color: var(--yellow); }
  .badge.rojo { background: rgba(231,76,60,.15); color: var(--red); }
  canvas { width: 100% !important; height: 150px !important; }
  .card-empty { height: 150px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; font-family: var(--mono); }

  .panel-eventos { margin: 0 24px 24px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .panel-eventos-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .panel-eventos h3 { margin: 0; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  select.filtro { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 8px; font-size: 12px; font-family: var(--mono); }
  .tabla-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; font-family: var(--mono); }
  th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  tbody tr:hover { background: rgba(255,255,255,.02); }
  .sev-CRITICAL { color: var(--red); font-weight: 700; }
  .sev-WARNING { color: var(--yellow); font-weight: 700; }
  .fila-vacia td { text-align: center; color: var(--muted); padding: 20px; }

  .controles { display: flex; gap: 10px; align-items: center; padding: 0 24px 20px; flex-wrap: wrap; }
  button {
    background: var(--blue); border: none; color: #04121f; font-weight: 600; padding: 8px 14px;
    border-radius: 8px; cursor: pointer; font-size: 13px; transition: filter .15s, transform .1s;
  }
  button:hover { filter: brightness(1.1); }
  button:active { transform: translateY(1px); }
  button.secundario { background: var(--panel); border: 1px solid var(--border); color: var(--text); font-weight: 500; }
  button.pausado { background: var(--amber); }
  .vol-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .vol-wrap label { color: var(--muted); font-size: 12px; }
  input[type=range] { width: 130px; accent-color: var(--blue); }

  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
</style>
</head>
<body>

<header>
  <h1>🌍 SIPIA <span class="tag">monitoreo sísmico</span></h1>
  <div class="estado-wrap">
    <span class="hora" id="horaActualizacion">--:--:--</span>
    <div class="estado" role="status" aria-live="polite">
      <span class="dot" id="dotEstado"></span>
      <span id="textoEstado">Conectando…</span>
    </div>
  </div>
</header>

<div class="kpis" id="kpiGrid">
  <div class="kpi"><div class="top"><div class="label">Lecturas</div><span class="icon">📈</span></div><div class="valor" id="kpiLecturas">0</div></div>
  <div class="kpi"><div class="top"><div class="label">Anomalías hoy</div><span class="icon">⚠️</span></div><div class="valor" id="kpiAnomalias">0</div></div>
  <div class="kpi"><div class="top"><div class="label">Lecturas VIB-01</div><span class="icon">📳</span></div><div class="valor" id="kpiSismos">0</div></div>
  <div class="kpi"><div class="top"><div class="label">Sensores activos</div><span class="icon">🛰️</span></div><div class="valor" id="kpiSensores">0</div></div>
</div>

<div class="controles">
  <button onclick="exportarPDF()">📄 Exportar PDF</button>
  <button class="secundario" onclick="toggleSilencio()" id="btnSilenciar" aria-pressed="false">🔊 Silenciar</button>
  <button class="secundario" onclick="togglePausa()" id="btnPausa" aria-pressed="false">⏸ Pausar</button>
  <div class="vol-wrap">
    <label for="sliderVolumen">Volumen</label>
    <input type="range" id="sliderVolumen" min="0" max="100" value="80" onchange="ajustarVolumen(this.value)">
  </div>
</div>

<div class="grid-sensores" id="gridSensores">
  <!-- Las tarjetas de graficas se generan por JS -->
</div>

<div class="panel-eventos">
  <div class="panel-eventos-header">
    <h3>Historial de últimas lecturas / eventos</h3>
    <select class="filtro" id="filtroSensor" onchange="renderTabla()" aria-label="Filtrar por sensor">
      <option value="">Todos los sensores</option>
    </select>
  </div>
  <div class="tabla-wrap">
    <table>
      <thead><tr><th>Sensor</th><th>Valor</th><th>Unidad</th><th>Severidad</th><th>Hora</th></tr></thead>
      <tbody id="tablaEventos"><tr class="fila-vacia"><td colspan="5">Esperando datos…</td></tr></tbody>
    </table>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* ============================================================
   SIPIA Dashboard --- HTML + JavaScript puro (sin dependencias
   externas mas alla de Chart.js via CDN para las graficas).
   Consume la API REST expuesta por industrial_platform.py
   ============================================================ */

const API_BASE = "http://127.0.0.1:8000";
const SENSORES = ["VIB-01", "ACCEL", "GYRO", "TEMP", "PRESS"];
const MAX_PUNTOS = 30;
const INTERVALO_MS = 3000;
const MAX_REINTENTO_MS = 30000;
const COLORES = {
  "VIB-01": "#e74c3c", "ACCEL": "#3ea6ff", "GYRO": "#2ecc71",
  "TEMP": "#ffb547", "PRESS": "#a385ff",
};

const charts = {};
let pausado = false;
let intervaloId = null;
let reintentoActual = INTERVALO_MS;
let ultimosEventosVistos = new Set();
let ultimasLecturas = [];
let ultimoSevPorSensor = {};

function escapar(str) {
  const d = document.createElement("div");
  d.textContent = str ?? "";
  return d.innerHTML;
}

function crearTarjetaSensor(sensorId) {
  const grid = document.getElementById("gridSensores");
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-header">
      <h3>${escapar(sensorId)}</h3>
      <div style="display:flex; align-items:center; gap:8px;">
        <span class="ultimo" id="ultimo-${sensorId}"></span>
        <span class="badge verde" id="badge-${sensorId}">OK</span>
      </div>
    </div>
    <canvas id="chart-${sensorId}" role="img" aria-label="Gráfica de lecturas de ${escapar(sensorId)}"></canvas>
  `;
  grid.appendChild(card);

  const color = COLORES[sensorId] || "#3ea6ff";
  const ctx = document.getElementById(`chart-${sensorId}`).getContext("2d");
  charts[sensorId] = new Chart(ctx, {
    type: "line",
    data: { labels: [], datasets: [{
      data: [], borderColor: color, backgroundColor: color + "22",
      tension: .3, pointRadius: 0, borderWidth: 2, fill: true,
    }]},
    options: {
      animation: false, responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { grid: { color: "#22303f" }, ticks: { color: "#7c8b99", font: { size: 10 }, maxTicksLimit: 4 } },
      },
    },
  });

  const filtro = document.getElementById("filtroSensor");
  const opt = document.createElement("option");
  opt.value = sensorId; opt.textContent = sensorId;
  filtro.appendChild(opt);
}

function actualizarBadge(sensorId, severidad) {
  const badge = document.getElementById(`badge-${sensorId}`);
  if (!badge) return;
  badge.className = "badge " + (severidad === "CRITICAL" ? "rojo" : severidad === "WARNING" ? "amarillo" : "verde");
  badge.textContent = severidad === "CRITICAL" ? "CRÍTICO" : severidad === "WARNING" ? "ADVERTENCIA" : "OK";
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${url} → HTTP ${res.status}`);
  return res.json();
}

async function actualizarDashboard() {
  if (pausado) return;
  try {
    const [estado, lecturas, eventos] = await Promise.all([
      fetchJSON(`${API_BASE}/estado`),
      fetchJSON(`${API_BASE}/lecturas?limite=100`),
      fetchJSON(`${API_BASE}/eventos?limite=20`),
    ]);

    setConectado(true);
    reintentoActual = INTERVALO_MS;
    ultimasLecturas = lecturas;

    const sensoresActivos = estado.sensores_activos || [];
    const kpiSensores = document.getElementById("kpiSensores");
    kpiSensores.textContent = sensoresActivos.length;

    document.getElementById("kpiLecturas").textContent = estado.lecturas ?? 0;
    document.getElementById("kpiAnomalias").textContent = estado.eventos ?? 0;
    document.getElementById("kpiSismos").textContent =
      lecturas.filter(l => l.sensor_id === "VIB-01").length;
    document.getElementById("kpiAnomalias").closest(".kpi").classList.toggle("alerta", (estado.eventos ?? 0) > 0);

    // Actualizar graficas por sensor (usa las ultimas N lecturas de cada uno)
    SENSORES.forEach(sensorId => {
      const propias = lecturas.filter(l => l.sensor_id === sensorId).slice(0, MAX_PUNTOS).reverse();
      if (!charts[sensorId]) return;
      if (propias.length === 0) return;
      charts[sensorId].data.labels = propias.map(l => (l.timestamp || "").slice(11, 19));
      charts[sensorId].data.datasets[0].data = propias.map(l => l.value);
      charts[sensorId].update();
      const ultima = propias[propias.length - 1];
      const elUltimo = document.getElementById(`ultimo-${sensorId}`);
      if (elUltimo && ultima) elUltimo.textContent = `${Number(ultima.value).toFixed(2)} ${ultima.unit ?? ""}`;
    });

    // Marcar severidad segun eventos recientes por sensor (el mas reciente por sensor)
    const sevPorSensor = {};
    eventos.forEach(e => { if (!sevPorSensor[e.sensor_id]) sevPorSensor[e.sensor_id] = e.severity; });
    ultimoSevPorSensor = sevPorSensor;
    SENSORES.forEach(s => actualizarBadge(s, sevPorSensor[s] || "OK"));

    // Sonar alerta ante eventos criticos nuevos
    eventos.forEach(e => {
      const id = `${e.sensor_id}-${e.timestamp}-${e.severity}`;
      if (!ultimosEventosVistos.has(id)) {
        ultimosEventosVistos.add(id);
        if (e.severity === "CRITICAL") beep(880, .25);
        else if (e.severity === "WARNING") beep(440, .15);
      }
    });
    if (ultimosEventosVistos.size > 500) ultimosEventosVistos = new Set(eventos.map(e => `${e.sensor_id}-${e.timestamp}-${e.severity}`));

    renderTabla();
    document.getElementById("horaActualizacion").textContent = new Date().toLocaleTimeString();

  } catch (err) {
    console.error("Error actualizando dashboard:", err);
    setConectado(false);
    programarReintento();
  }
}

function renderTabla() {
  const tbody = document.getElementById("tablaEventos");
  const filtro = document.getElementById("filtroSensor").value;
  const filas = ultimasLecturas.filter(l => !filtro || l.sensor_id === filtro).slice(0, 15);

  if (filas.length === 0) {
    tbody.innerHTML = `<tr class="fila-vacia"><td colspan="5">Sin lecturas para mostrar</td></tr>`;
    return;
  }

  tbody.innerHTML = filas.map(l => {
    const esUltimaDelSensor = ultimasLecturas.find(x => x.sensor_id === l.sensor_id) === l;
    const sev = esUltimaDelSensor ? (ultimoSevPorSensor[l.sensor_id] || "") : "";
    return `<tr>
      <td>${escapar(l.sensor_id)}</td>
      <td>${Number(l.value).toFixed(2)}</td>
      <td>${escapar(l.unit)}</td>
      <td class="sev-${escapar(sev)}">${escapar(sev) || "—"}</td>
      <td>${escapar((l.timestamp || "").slice(11, 19))}</td>
    </tr>`;
  }).join("");
}

function setConectado(ok) {
  document.getElementById("dotEstado").className = "dot " + (ok ? "conectado" : "desconectado");
  document.getElementById("textoEstado").textContent = ok
    ? "Conectado — recibiendo datos en tiempo real"
    : "Desconectado — reintentando…";
}

function programarReintento() {
  if (intervaloId) clearTimeout(intervaloId);
  reintentoActual = Math.min(reintentoActual * 1.7, MAX_REINTENTO_MS);
  intervaloId = setTimeout(actualizarDashboard, reintentoActual);
}

function cicloNormal() {
  if (intervaloId) clearTimeout(intervaloId);
  intervaloId = setTimeout(async () => {
    await actualizarDashboard();
    cicloNormal();
  }, INTERVALO_MS);
}

function togglePausa() {
  pausado = !pausado;
  const btn = document.getElementById("btnPausa");
  btn.textContent = pausado ? "▶ Reanudar" : "⏸ Pausar";
  btn.classList.toggle("pausado", pausado);
  btn.setAttribute("aria-pressed", String(pausado));
}

/* --- Alertas de audio via Web Audio API (fallback si el backend no reproduce sonido) --- */
let silenciado = false;
let volumen = 0.8;
let audioCtx = null;
function obtenerAudioCtx() {
  if (!audioCtx && window.AudioContext) audioCtx = new AudioContext();
  return audioCtx;
}

function beep(frecuencia = 880, duracion = 0.2) {
  if (silenciado) return;
  const ctx = obtenerAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.value = frecuencia;
  gain.gain.value = volumen * 0.3;
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duracion);
}

function toggleSilencio() {
  silenciado = !silenciado;
  const btn = document.getElementById("btnSilenciar");
  btn.textContent = silenciado ? "🔇 Silenciado" : "🔊 Silenciar";
  btn.setAttribute("aria-pressed", String(silenciado));
  fetch(`${API_BASE}/alertas/silenciar`, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ silenciar: silenciado }),
  }).catch(() => {});
}

function ajustarVolumen(valor) {
  volumen = valor / 100;
  fetch(`${API_BASE}/alertas/volumen`, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ volumen }),
  }).catch(() => {});
}

function exportarPDF() {
  window.open(`${API_BASE}/reporte`, "_blank");
}

/* --- Inicializacion --- */
SENSORES.forEach(crearTarjetaSensor);
actualizarDashboard();
cicloNormal();
</script>
</body>
</html>
